<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <title>RSCO Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; }
        button:hover { background-color: #2980b9; }
        #status { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .admin-box { margin-top: 25px; padding: 15px; border: 2px dashed #3498db; border-radius: 10px; background-color: #ebf5fb; display: none; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>RSCO Attendance</h2>
    <div id="reader"></div>
    <div id="status">Ready to scan...</div>

    <div id="adminSection" class="admin-box">
        <h3>Admin: Field Duty Entry</h3>
        <p style="font-size: 12px; color: #555;">Select employee for manual punch:</p>
        <select id="employeeDropdown">
            <option>Loading employee list...</option>
        </select>
        <button id="adminBtn" onclick="submitAdminPunch()" style="background-color: #27ae60;">Submit Manual Punch</button>
    </div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const adminSection = document.getElementById('adminSection');

    // 1. Generate or Retrieve Device Fingerprint
    let fingerprint = localStorage.getItem('deviceFingerprint');
    if (!fingerprint) {
        fingerprint = 'FP-' + Math.random().toString(36).substr(2, 9) + Date.now();
        localStorage.setItem('deviceFingerprint', fingerprint);
    }

    // 2. Initialize Scanner
    const html5QrCode = new html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);

    function onScanSuccess(decodedText) {
        // We ignore the QR content and use the stored Fingerprint + Current Time
        statusDiv.innerHTML = "Processing...";
        statusDiv.className = "";

        google.script.run
            .withSuccessHandler(handleResponse)
            .processPunch("", fingerprint, false, ""); 
    }

    // 3. Handle Script Responses
    function handleResponse(response) {
        statusDiv.innerHTML = response;
        if (response.includes("Success")) {
            statusDiv.className = "success";
            // If the user is an Admin, load the employee list
            checkAdminRole();
        } else if (response.includes("NEW_DEVICE")) {
            registerNewUser();
        } else {
            statusDiv.className = "error";
        }
    }

    function registerNewUser() {
        let name = prompt("This device is not linked. Please enter your Full Name (exactly as in records):");
        if (name) {
            google.script.run
                .withSuccessHandler(handleResponse)
                .registerDevice(name, fingerprint);
        }
    }

    // 4. Admin Logic
    function checkAdminRole() {
        google.script.run.withSuccessHandler(function(names) {
            if (names && names.length > 0) {
                adminSection.style.display = 'block';
                let select = document.getElementById('employeeDropdown');
                select.innerHTML = '';
                names.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name;
                    opt.text = name;
                    select.appendChild(opt);
                });
            }
        }).getEmployeeList(fingerprint); // Pass FP to verify admin status
    }

    function submitAdminPunch() {
        let targetEmployee = document.getElementById('employeeDropdown').value;
        statusDiv.innerHTML = "Admin processing for " + targetEmployee + "...";
        
        google.script.run
            .withSuccessHandler(handleResponse)
            .processPunch("", fingerprint, true, targetEmployee);
    }

    // Check for admin role on page load
    window.onload = checkAdminRole;

</script>
</body>
</html>
