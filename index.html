<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSCO Terminal</title>
    <meta name="apple-mobile-web-app-title" content="RSCO">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=RS&background=007bff&color=fff&size=512&font-size=0.4&bold=true">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #1a1a1a; 
            color: white; 
            overflow: hidden;
        }
        .logo { 
            font-size: 32px; 
            font-weight: 900; 
            margin-bottom: 5px; 
            letter-spacing: 4px; 
            color: #007bff;
        }
        .subtitle {
            font-size: 14px;
            margin-bottom: 30px;
            opacity: 0.7;
            text-transform: uppercase;
        }
        #qrcode { 
            padding: 20px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        #qrcode:active { transform: scale(0.95); }
        #timer-bar {
            width: 280px;
            height: 4px;
            background: #333;
            margin-top: 25px;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress {
            width: 100%;
            height: 100%;
            background: #007bff;
            transition: width 1s linear;
        }
        .instruction {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="logo">RSCO TERMINAL</div>
    <div class="subtitle">Office Attendance System</div>

    <div id="qrcode"></div>

    <div id="timer-bar">
        <div id="progress"></div>
    </div>
    <div class="instruction">Scan to Clock In/Out</div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylE8J0ZIUsu1wFZFGPrh9w_AnCuN3Z6XnswchRUEFEpJwTn8FV-O8p-z7mP1ddgqFIrQ/exec"; 
        const SECRET = "RSCO_SECURE_2026";
        const ROTATION_SECONDS = 30;
        // ---------------------

        let timeLeft = ROTATION_SECONDS;

        function generateQR() {
            const ts = Math.floor(Date.now() / 1000);
            // Create token: SECRET|timestamp
            const token = btoa(SECRET + "|" + ts);
            
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // Clear old QR
            
            new QRCode(qrContainer, { 
                text: SCRIPT_URL + "?token=" + token, 
                width: 280, 
                height: 280,
                correctLevel: QRCode.CorrectLevel.M
            });
            
            timeLeft = ROTATION_SECONDS;
            updateProgress();
        }

        function updateProgress() {
            const percent = (timeLeft / ROTATION_SECONDS) * 100;
            document.getElementById("progress").style.width = percent + "%";
            
            if (timeLeft <= 0) {
                generateQR();
            } else {
                timeLeft--;
                setTimeout(updateProgress, 1000);
            }
        }

        // Initial Start
        generateQR();
    </script>
</body>
</html>
